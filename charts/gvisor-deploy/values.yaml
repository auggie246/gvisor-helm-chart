# Default values for gvisor-deploy.
#
# Deployment model for installing/cleaning up gVisor on nodes:
#   daemonset: (default) a long-running privileged DaemonSet installs gVisor on
#              every matching node. The installer pod stays alive (sleep infinity)
#              after install so it can be re-triggered on restart.
#   job:       no always-on component. A tiny dispatcher Job (post-install/upgrade
#              hook) enumerates target nodes LIVE, creates one node-pinned install
#              Job per node (paced to job.parallelism), and each per-node Job runs
#              the install script and EXITS. Uninstall works the same way via a
#              pre-delete dispatcher that fans out per-node cleanup Jobs.
#
# Why a dispatcher instead of rendering per-node Jobs in the chart: Helm stores
# the whole rendered release in one ~1 MiB Secret, and node membership changes
# between install and uninstall. The dispatcher keeps the release O(1), resolves
# nodes at run time, and paces a rollout with built-in Jobs only.
deploymentMode: daemonset  # daemonset | job

# Node label applied by the install dispatcher to track which nodes have gVisor
# installed. The cleanup dispatcher defaults to targeting nodes carrying this
# label, so cleanup only runs where install actually succeeded.
nodeLabel: "gvisor.dev/installed"

# Settings specific to deploymentMode: job
job:
  # Image for the dispatcher (needs kubectl + sh). Used by both the install and
  # cleanup dispatcher Jobs.
  kubectlImage:
    repository: bitnamilegacy/kubectl
    tag: "1.31"
    pullPolicy: IfNotPresent

  # Maximum number of nodes processed concurrently. The dispatcher creates at
  # most this many per-node Jobs per batch, waiting for each batch to finish
  # before starting the next. Lower it to pace the rollout (e.g. limit how many
  # CRI runtimes restart at once); raise it to install faster.
  parallelism: 1

  # How long finished per-node Jobs are retained before automatic garbage
  # collection (seconds).
  ttlSecondsAfterFinished: 600

  # Per-node retry budget: retries for a single node's Job before it is marked
  # failed. One node failing never aborts the others.
  backoffLimit: 3

  # Timeout (seconds) the dispatcher waits for each per-node Job to complete.
  jobTimeout: 600

  # How to choose which nodes get a per-node INSTALL Job. Precedence:
  #   1. job.nodes (explicit list of node names) - if non-empty, used verbatim.
  #   2. otherwise a label selector built from job.nodeSelector (equality) ANDed
  #      with job.nodeSelectorExpressions (In/NotIn/Exists/DoesNotExist).
  #   3. if both are empty, ALL nodes are targeted.
  #
  # DEFAULT: target worker (non-control-plane) nodes.
  #   - Target nodes with a specific label:
  #       job:
  #         nodeSelector: { gvisor: "enabled" }
  #   - Target every node (including control-plane), e.g. single-node clusters:
  #       job:
  #         nodeSelectorExpressions: []
  #   - Pin to explicit nodes:
  #       job:
  #         nodes: ["worker-1", "worker-2"]
  nodes: []
  # Equality label selector (ANDed with nodeSelectorExpressions). Ignored when
  # job.nodes is set.
  nodeSelector: {}
  # Kubernetes-style label selector requirements. Each entry: { key, operator, values }.
  # operator is In, NotIn (values required), Exists, or DoesNotExist (values must be empty).
  # Default selects nodes that are NOT control-plane/master (i.e. worker nodes).
  nodeSelectorExpressions:
    - key: node-role.kubernetes.io/control-plane
      operator: DoesNotExist
    - key: node-role.kubernetes.io/master
      operator: DoesNotExist

  # Node selection for the UNINSTALL (pre-delete hook) dispatcher. Same precedence
  # and semantics as install. The DEFAULT targets nodes carrying the nodeLabel
  # (i.e. exactly the nodes install actually labeled), resolved LIVE at uninstall
  # time. Override to clean a different set.
  cleanup:
    nodes: []
    nodeSelector: {}
    nodeSelectorExpressions:
      - key: gvisor.dev/installed
        operator: Exists

nameOverride: ""
fullnameOverride: ""

# Namespace override for namespaced resources. Defaults to the release namespace.
namespaceOverride: ""

# Image used by the node installer DaemonSet.
# Requirements: POSIX shell + (curl OR wget) + coreutils (sha512sum, install, cp, sed).
image:
  repository: debian
  tag: "stable-slim"
  pullPolicy: IfNotPresent

imagePullSecrets: []

# ---------------------------------------------------------------------------
# Source for the gVisor binaries.
# These are pulled from YOUR private repository. Everything here is
# configurable so the chart never reaches out to the public gVisor storage
# unless you point it there.
# Final download URL = <baseUrl>[/<path>]/<fileName>
# ---------------------------------------------------------------------------
binaries:
  # Base URL of the private raw repository. No trailing slash. REQUIRED.
  baseUrl: "https://repo.example.com/repository/gvisor-raw"
  # Optional sub-path appended to baseUrl, e.g. "release/latest/x86_64".
  path: ""
  runsc:
    fileName: "runsc"
    # Optional checksum file served next to the binary. Empty => skip verification.
    sha512FileName: ""
  shim:
    fileName: "containerd-shim-runsc-v1"
    sha512FileName: ""
  # Verify each binary against its .sha512 file (requires *.sha512FileName set).
  verifyChecksum: false
  # Extra raw args appended to the download tool invocation (curl/wget),
  # e.g. ["--insecure"] or a custom header. Credentials should use downloadSecret.
  extraDownloadArgs: []

# Optional secret supplying basic-auth credentials for the private repo.
# When enabled, REPO_USERNAME / REPO_PASSWORD are injected into the installer
# from this secret and used for authenticated downloads.
downloadSecret:
  enabled: false
  name: ""
  usernameKey: "username"
  passwordKey: "password"

# Optional CA certificate bundle for verifying TLS against a private/internal CA
# (e.g. a private repo served behind an org root CA). When enabled, the secret is mounted
# read-only and its CA file is passed to curl (--cacert) / wget (--ca-certificate),
# letting you drop "--insecure" from extraDownloadArgs and download securely.
#
# NOTE: Kubernetes secrets are namespaced. A "root-ca" secret living in
# "flux-system" CANNOT be mounted here directly -- it must be replicated into this
# chart's release namespace (e.g. via a Flux SecretController / kustomize sync).
# Set `name` to the replicated secret in THIS namespace.
caBundle:
  enabled: false
  # Name of the secret (in the release namespace) holding the CA certificate.
  name: ""
  # Key within the secret that contains the PEM-encoded CA certificate.
  key: "ca.crt"
  # Directory the secret is mounted into inside the installer container.
  mountPath: "/etc/gvisor-deploy/ca"

# Host install location for the binaries (gVisor docs default: /usr/local/bin).
install:
  binDir: "/usr/local/bin"

# Containerd configuration handling.
containerd:
  # Path to the containerd config file on the host.
  configPath: "/etc/containerd/config.toml"
  # Suffix for the timestamped backup taken before any edit.
  backupSuffix: ".gvisor.bak"
  # Restart containerd (systemctl restart containerd) after editing the config.
  restartContainerd: true
  # Runtime name registered in containerd config AND used as the RuntimeClass handler.
  runtimeName: "runsc"

# RuntimeClass that workloads reference via spec.runtimeClassName.
runtimeClass:
  create: true
  name: "gvisor"

# ---------------------------------------------------------------------------
# DaemonSet scheduling / pod settings.
# ---------------------------------------------------------------------------
nodeSelector: {}
tolerations: []
affinity: {}
priorityClassName: ""
resources: {}
updateStrategy:
  type: RollingUpdate

# On `helm uninstall`, run a cleanup hook that restores the containerd config
# backup and removes the installed binaries from the host.
cleanup:
  enabled: true
